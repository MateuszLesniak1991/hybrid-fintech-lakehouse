services:
  postgres:
    image: postgres:16
    container_name: fintech-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fintech
      POSTGRES_USER: fintech_user
      POSTGRES_PASSWORD: fintech_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - fintech-net

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: fintech-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@local.lab
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - fintech-net

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: fintech-redpanda
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - "1G"
      - --reserve-memory
      - "0M"
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      - "9092:9092"
      - "19092:19092"
      - "9644:9644"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    networks:
      - fintech-net

  redpanda-console:
    image: redpandadata/console:latest
    container_name: fintech-redpanda-console
    restart: unless-stopped
    environment:
      KAFKA_BROKERS: redpanda:9092
    ports:
      - "8080:8080"
    depends_on:
      - redpanda
    networks:
      - fintech-net

  minio:
    image: minio/minio:latest
    container_name: fintech-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - fintech-net

volumes:
  postgres_data:
  redpanda_data:
  minio_data:

networks:
  fintech-net:
    driver: bridge
